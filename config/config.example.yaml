server:
  host: "0.0.0.0"
  port: 8080

database:
  dsn: "postgres://iam:iam@localhost:5432/iam?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

jwt:
  secret: "change-me-in-production"
  issuer: "openiam"
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"

siwe:
  domain: "localhost"
  uri: "http://localhost:8080"
  statement: "Sign in to OpenIAM"
  nonce_ttl: "5m"
