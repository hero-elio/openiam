server:
  host: "0.0.0.0"
  port: 8080

database:
  dsn: "postgres://iam:iam@localhost:5432/iam?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

jwt:
  # MUST be replaced with a strong (>= 32 bytes) random secret before
  # running in any non-development environment. Generate one with e.g.
  #   openssl rand -base64 48
  # The boot path refuses to start if this is empty, equals the
  # placeholder below, or is shorter than 32 bytes — unless
  # `allow_insecure: true` (only for local hacking).
  secret: "change-me-in-production"
  allow_insecure: false
  issuer: "openiam"
  access_token_ttl: "15m"
  refresh_token_ttl: "168h"

siwe:
  domain: "localhost"
  uri: "http://localhost:8080"
  statement: "Sign in to OpenIAM"
  nonce_ttl: "5m"
